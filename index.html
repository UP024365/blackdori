<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackdori 테스트 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full mx-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Blackdori Project</h1>
        <p class="text-gray-600 mb-6">GitHub Pages 배포 테스트 중입니다.</p>
        
        <button id="testBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-300 w-full">
            연결 테스트 클릭!
        </button>

        <div id="status" class="mt-4 text-sm text-green-600 font-medium hidden">
            ✅ 자바스크립트 연결 성공!
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    
    <script>
        // 간단한 로컬 테스트용 (main.js 연결 확인용)
        document.getElementById('testBtn').addEventListener('click', function() {
            document.getElementById('status').classList.remove('hidden');
            this.innerText = "작동 확인 완료";
            this.classList.replace('bg-blue-600', 'bg-green-500');
        });
    </script>
</body>
</html>
