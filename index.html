<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackdori - 도마뱀 관리 시스템</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3M3Az4AF4GI058EDGCmAVDMGBv7NC9ID6fREoB7A9BAF7AAAFG8Y0S4Z69AAAAAASUVORK5CYII=">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 필터 바 스타일링 */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .filter-bar input { flex: 2; }
        .filter-bar select { flex: 1; min-width: 120px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>🦎 BLACKDORI SYSTEM</h1>
            <button id="authBtn">관리자 로그인</button>
        </header>

        <nav class="tab-menu">
            <button onclick="showSection('buyerSection')">구매자 관리</button>
            <button onclick="showSection('lizardSection')">개체 관리</button>
            <button onclick="showSection('marketSection')" class="active">카페 바로가기</button>
        </nav>

        <section id="buyerSection" class="content-section" style="display: none;">
            <div class="input-section" style="display: none;">
                <input type="text" id="custName" placeholder="구매자 성함">
                <input type="text" id="custContact" placeholder="연락처">
                <select id="custGrade">
                    <option value="C">C 등급</option>
                    <option value="B">B 등급</option>
                    <option value="A">A 등급</option>
                    <option value="S">S 등급</option>
                </select>
                <button id="addBuyerBtn">구매자 등록</button>
            </div>

            <div class="filter-bar">
                <input type="text" id="buyerSearch" placeholder="이름 또는 연락처로 검색...">
                <select id="buyerSort">
                    <option value="recent">최신순</option>
                    <option value="name_asc">이름 (ㄱ-ㅎ)</option>
                    <option value="grade_desc">등급 (S-C)</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr><th>이름</th><th>연락처</th><th>등급</th><th>관리</th></tr>
                </thead>
                <tbody id="customerList"></tbody>
            </table>
        </section>

        <section id="lizardSection" class="content-section" style="display: none;">
            <div class="input-section" style="display: none;">
                <input type="text" id="lizardYear" placeholder="연도 (예: 2026)">
                <input type="text" id="morph" placeholder="모프명 (예: BMD)">
                <input type="text" id="lizardId" placeholder="번호 (직접 입력)">
                <input type="text" id="fatherId" placeholder="부 개체">
                <input type="text" id="motherId" placeholder="모 개체">
                <select id="buyerSelect"><option value="">구매자 연동</option></select>
                <button id="addLizardBtn">개체 등록</button>
            </div>

            <div class="filter-bar">
                <input type="text" id="lizardSearch" placeholder="코드, 모프, 또는 소유주 검색...">
                <select id="lizardSort">
                    <option value="recent">최신순</option>
                    <option value="morph_asc">모프 (A-Z)</option>
                    <option value="unassigned">미분양 개체만</option>
                    <option value="name_asc">소유주이름 순</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr><th>고유 코드</th><th>모프</th><th>부/모</th><th>소유주</th><th>관리</th></tr>
                </thead>
                <tbody id="lizardList"></tbody>
            </table>
        </section>

        <section id="marketSection" class="content-section">
            <div class="cafe-container" style="width: 100%; height: 600px; border: 2px solid #111; background: #fff;">
                <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #eee; background: #f8fafc;">
                    <h2 style="font-size: 1rem; margin: 0;">파충류 매니아 카페</h2>
                    <button onclick="window.open('https://cafe.naver.com/reptilia', '_blank')" style="padding: 5px 10px; font-size: 0.8rem; background: #111; color: #fff; border: none; cursor: pointer;">
                        새 창으로 열기 ↗
                    </button>
                </header>
                <iframe src="https://cafe.naver.com/reptilia" style="width: 100%; height: calc(100% - 45px); border: none;"></iframe>
            </div>
        </section>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
