<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackdori - 도마뱀 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>

    <div class="admin-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="font-size: 1.5rem; font-weight: 800;">🦎 도마뱀 분양 관리</h1>
            <button id="authBtn" style="background: none; border: 1px solid #ddd; padding: 5px 15px; border-radius: 20px; cursor: pointer;">로그인</button>
        </header>

        <section class="input-section">
            <input type="text" id="custName" placeholder="구매자 성함">
            <input type="text" id="lizardType" placeholder="도마뱀 종류 (예: 크레)">
            <select id="custGrade">
                <option value="C">C 등급 (신규)</option>
                <option value="B">B 등급 (일반)</option>
                <option value="A">A 등급 (단골)</option>
                <option value="S">S 등급 (VVIP)</option>
            </select>
            <button id="addBtn">신규 등록</button>
        </section>

        <section class="list-section">
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>종류</th>
                        <th>등급</th>
                        <th>등록일</th>
                    </tr>
                </thead>
                <tbody id="customerList">
                    <tr>
                        <td>홍길동</td>
                        <td>레오파드 게코</td>
                        <td><span class="grade-S">S</span></td>
                        <td>2026-04-23</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script type="module" src="./js/main.js"></script>
    <script>
        console.log("HTML은 정상 작동 중입니다!");
        window.onload = () => {
            const btn = document.getElementById('addBtn');
            if (btn) console.log("버튼을 찾았습니다!");
            else console.error("버튼을 찾을 수 없습니다. HTML 구조를 확인하세요.");
        };
    </script>
</body>
</html>
